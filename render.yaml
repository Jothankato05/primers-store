services:
  - type: web
    name: primers-api
    env: node
    region: ohio
    buildCommand: npm install
    startCommand: NODE_ENV=production node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/server
      sizeGB: 1
